# EverMind v2 Configuration Reference
#
# This file documents all available settings.
# In practice, you rarely need to set anything — defaults work out of the box.
# Configure via the local .env file.

storage:
  # Directory for SQLite databases (one per project, auto-named from git remote)
  home: ~/.evermind         # env: EVERMIND_HOME

  # Override auto-detected project space
  # default_space: coding:my-project  # env: EVERMIND_DEFAULT_SPACE

embedding:
  provider: siliconflow              # env: EVERMIND_EMBED_PROVIDER
  model: Qwen/Qwen3-Embedding-8B      # env: EVERMIND_EMBED_MODEL
  dim: 512                            # env: EVERMIND_EMBED_DIM
  enabled: true                       # env: EVERMIND_EMBED_ENABLED
  warmup_on_start: true               # env: EVERMIND_EMBED_WARMUP_ON_START

reranker:
  enabled: true                       # env: EVERMIND_RERANK_ENABLED
  model: Qwen/Qwen3-Reranker-8B       # env: EVERMIND_RERANK_MODEL
  candidates: 30                      # env: EVERMIND_RERANK_CANDIDATES

llm_extraction:
  enabled: true                       # env: EVERMIND_LLM_ENABLED
  model: deepseek-ai/DeepSeek-V4-Flash # env: EVERMIND_LLM_MODEL
  briefing_summary: false             # env: EVERMIND_LLM_BRIEFING_SUMMARY

siliconflow:
  # Keep real keys only in local .env.
  api_key: sk-...                     # env: EVERMIND_SILICONFLOW_API_KEY
  base_url: https://api.siliconflow.cn/v1 # env: EVERMIND_SILICONFLOW_BASE_URL

# ── MCP Server ──────────────────────────────────────────────────────────────
# The MCP server is started by the AI client (Claude Desktop / Cursor / Codex).
# You do not need to start it manually.
#
# Minimum MCP config (add to claude_desktop_config.json):
#
#   "mcpServers": {
#     "evermind": {
#       "command": "uv",
#       "args": ["run", "--directory", "/path/to/EverMind/mcp", "evermind-mcp"]
#     }
#   }
