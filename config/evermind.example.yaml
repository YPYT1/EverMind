# EverMind v2 Configuration Reference
#
# This file documents all available settings.
# In practice, you rarely need to set anything — defaults work out of the box.
# Configure via environment variables or the MCP server env block.

storage:
  # Directory for SQLite databases (one per project, auto-named from git remote)
  home: ~/.evermind         # env: EVERMIND_HOME

  # Override auto-detected project space
  # default_space: coding:my-project  # env: EVERMIND_DEFAULT_SPACE

embedding:
  # Local model (downloaded on first use, stored in HuggingFace cache)
  model: BAAI/bge-small-zh-v1.5   # env: EVERMIND_EMBED_MODEL
  enabled: true                     # env: EVERMIND_EMBED_ENABLED

  # To use English-optimized model:
  # model: all-MiniLM-L6-v2

  # To use OpenAI embeddings instead of local model:
  # api_key: sk-...                 # env: EVERMIND_EMBED_API_KEY
  # model: text-embedding-3-small

llm_extraction:
  # Optional: uses an LLM to extract structured facts from stored memories
  # Without this key, memories are stored as raw text (still useful)
  # api_key: sk-...                 # env: EVERMIND_LLM_API_KEY
  # model: gpt-4o-mini              # env: EVERMIND_LLM_MODEL
  # base_url: https://api.openai.com/v1  # env: EVERMIND_LLM_BASE_URL

# ── MCP Server ──────────────────────────────────────────────────────────────
# The MCP server is started by the AI client (Claude Desktop / Cursor / Codex).
# You do not need to start it manually.
#
# Minimum MCP config (add to claude_desktop_config.json):
#
#   "mcpServers": {
#     "evermind": {
#       "command": "uv",
#       "args": ["run", "--directory", "/path/to/EverMind/mcp", "evermind-mcp"]
#     }
#   }
